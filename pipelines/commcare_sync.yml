pipeline: commcare_sync
description: "Sync case and form data from CommCare HQ"
version: "1.0"
provider: commcare

sources:
  - name: cases
    description: "CommCare case records"
  - name: forms
    description: "CommCare form submission records (includes nested case updates)"

metadata_discovery:
  description: "Extract application structure, case types, and form definitions"

relationships:
  - from_table: raw_forms
    from_column: case_ids
    to_table: raw_cases
    to_column: case_id
    description: "Form submissions reference the cases they update (case_ids is a JSON array)"
